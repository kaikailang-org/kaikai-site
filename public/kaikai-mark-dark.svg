<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- kaikai mark — dark mode, no wordmark. -->
  <defs>
    <style>
      .strand { fill: none; stroke: #7aa7d9; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .accent { fill: none; stroke: #ffd166; stroke-width: 7; stroke-linecap: round; }
    </style>
  </defs>
  <path class="strand" d="M 70 70  Q 128 40  186 70  Q 156 128 186 186  Q 128 216 70 186  Q 100 128 70 70 Z"/>
  <path class="accent" d="M 128 60  Q 196 100 196 128  Q 156 156 128 196  Q 60 156 60 128  Q 100 100 128 60 Z"
        transform="rotate(45 128 128)"/>
  <g stroke="#ff8a9e" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="113" y1="100" x2="113" y2="156"/>
    <line x1="113" y1="128" x2="148" y2="100"/>
    <line x1="113" y1="128" x2="148" y2="156"/>
  </g>
  <circle cx="113" cy="128" r="7" fill="#fff" stroke="#ff8a9e" stroke-width="3"/>
</svg>
