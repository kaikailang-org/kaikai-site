<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- kaikai OG image — 1200x630, Open Graph standard for social cards.
       Light background panel + centered horizontal logo + tagline. -->
  <defs>
    <style>
      .strand { fill: none; stroke: #0d3b66; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .accent { fill: none; stroke: #faa916; stroke-width: 7; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Soft background -->
  <rect width="1200" height="630" fill="#f7f4ec"/>

  <!-- Decorative subtle line at top -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#0d3b66" stroke-width="2" opacity="0.15"/>
  <line x1="80" y1="550" x2="1120" y2="550" stroke="#0d3b66" stroke-width="2" opacity="0.15"/>

  <!-- Centered logo group: knot 256x256 + wordmark, total ~700 wide.
       Center the whole thing horizontally on x=600. -->
  <g transform="translate(290, 195)">
    <!-- Knot mark, scaled to 240x240 -->
    <g transform="scale(0.937)">
      <path class="strand" d="M 70 70  Q 128 40  186 70  Q 156 128 186 186  Q 128 216 70 186  Q 100 128 70 70 Z"/>
      <path class="accent" d="M 128 60  Q 196 100 196 128  Q 156 156 128 196  Q 60 156 60 128  Q 100 100 128 60 Z"
            transform="rotate(45 128 128)"/>
      <g stroke="#5b2333" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <line x1="113" y1="100" x2="113" y2="156"/>
        <line x1="113" y1="128" x2="148" y2="100"/>
        <line x1="113" y1="128" x2="148" y2="156"/>
      </g>
      <circle cx="113" cy="128" r="7" fill="#fff" stroke="#5b2333" stroke-width="3"/>
    </g>

    <!-- Wordmark next to the knot, centered vertically at 120 -->
    <text x="270" y="120"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="100" font-weight="700"
          fill="#0d3b66" letter-spacing="6"
          dominant-baseline="central" text-anchor="start">
      kaikai
    </text>
  </g>

  <!-- Tagline -->
  <text x="600" y="490"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="32" font-weight="500"
        fill="#0d3b66" opacity="0.7" letter-spacing="2"
        text-anchor="middle">
    a functional language with effects
  </text>
</svg>
